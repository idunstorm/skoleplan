  laerer:
  - "Hvordan musikk speiler og påvirker samfunnet"
  laereplan:
  ressurs:
  sporsmal:
  - "Finnes det en sang som har betydd noe for en hel generasjon? Hvilken, og hvorfor?"
Out of This World:
  blurb: Vi jobber med fantasy og science fiction gjennom lytting, lesing og snakking på engelsk.
  laerer:
  - Snakke, lese og lytte om fantasy og science fiction
  - Sammenligne sjangre og filmer
  - Kjenne kjennetegnene til fantasy og science fiction
  laereplan:
  ressurs:
  sporsmal:
  - Hvilken fantasy- eller science fiction-bok/film liker du best, og hvorfor?
